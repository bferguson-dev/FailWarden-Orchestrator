name: windows_service_down
description: Detect and recover a Windows service via PowerShell over SSH.
version: "1.0"
vars:
  host_alias: win-app-01
  service_name: Spooler
entry_step: check_service
steps:
  - id: check_service
    type: ssh
    name: Check Windows service state
    command: >-
      powershell -NoProfile -NonInteractive -Command
      "(Get-Service -Name '{{ service_name }}').Status"
    expect:
      exit_code: 0
      stdout_contains: Running
    timeout: 30
    retries: 1
    retry_delay: 5
    on_success: done
    on_failure: restart_service

  - id: restart_service
    type: ssh
    name: Restart Windows service
    command: >-
      powershell -NoProfile -NonInteractive -Command
      "Restart-Service -Name '{{ service_name }}' -ErrorAction Stop"
    expect:
      exit_code: 0
    timeout: 45
    retries: 1
    retry_delay: 5
    on_success: verify_service
    on_failure: escalate_ops

  - id: verify_service
    type: ssh
    name: Verify Windows service running
    command: >-
      powershell -NoProfile -NonInteractive -Command
      "(Get-Service -Name '{{ service_name }}').Status"
    expect:
      exit_code: 0
      stdout_contains: Running
    timeout: 30
    retries: 1
    retry_delay: 5
    on_success: done
    on_failure: escalate_ops

  - id: done
    type: end
    name: Service healthy
    summary: "{{ service_name }} is running on {{ host_alias }}"

  - id: escalate_ops
    type: escalate
    name: Escalate to operations
    notify:
      slack_enabled: true
      email_enabled: true
      slack_channel: "#ops-alerts"
      email_to:
        - "ops@example.local"
      title: "Escalation: windows_service_down"
      message: "{{ service_name }} recovery failed on {{ host_alias }}"

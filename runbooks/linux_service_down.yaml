name: linux_service_down
description: Detect and recover a Linux systemd service over SSH.
version: "1.0"
vars:
  host_alias: linux-web-01
  service_name: nginx
entry_step: check_service
steps:
  - id: check_service
    type: ssh
    name: Check current service state
    command: "systemctl is-active {{ service_name }}"
    expect:
      exit_code: 0
      stdout_contains: active
    timeout: 20
    retries: 1
    retry_delay: 5
    on_success: done
    on_failure: restart_service

  - id: restart_service
    type: ssh
    name: Restart the service
    command: "sudo systemctl restart {{ service_name }}"
    expect:
      exit_code: 0
    timeout: 30
    retries: 1
    retry_delay: 5
    on_success: verify_service
    on_failure: escalate_ops

  - id: verify_service
    type: ssh
    name: Confirm service is active
    command: "systemctl is-active {{ service_name }}"
    expect:
      exit_code: 0
      stdout_contains: active
    timeout: 20
    retries: 1
    retry_delay: 5
    on_success: done
    on_failure: escalate_ops

  - id: done
    type: end
    name: Service healthy
    summary: "{{ service_name }} is active on {{ host_alias }}"

  - id: escalate_ops
    type: escalate
    name: Escalate to operations
    notify:
      slack_enabled: true
      email_enabled: true
      slack_channel: "#ops-alerts"
      email_to:
        - "ops@example.local"
      title: "Escalation: linux_service_down"
      message: "{{ service_name }} recovery failed on {{ host_alias }}"

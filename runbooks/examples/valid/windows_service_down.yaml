name: windows_service_down
description: Validate and restart a Windows service over SSH + PowerShell.
version: "1.0"
vars:
  service_name: Spooler
  host_alias: win-app-01
entry_step: check_service
steps:
  - id: check_service
    type: ssh
    name: Check service state
    command: >-
      powershell -NoProfile -NonInteractive -Command
      "(Get-Service -Name '{{ service_name }}').Status"
    expect:
      exit_code: 0
      stdout_contains: Running
    timeout: 30
    retries: 1
    retry_delay: 5
    on_success: done
    on_failure: restart_service

  - id: restart_service
    type: ssh
    name: Restart service
    command: >-
      powershell -NoProfile -NonInteractive -Command
      "Restart-Service -Name '{{ service_name }}' -ErrorAction Stop"
    expect:
      exit_code: 0
    timeout: 45
    retries: 1
    retry_delay: 5
    on_success: verify_restart
    on_failure: escalate_ops

  - id: verify_restart
    type: ssh
    name: Verify service running
    command: >-
      powershell -NoProfile -NonInteractive -Command
      "(Get-Service -Name '{{ service_name }}').Status"
    expect:
      exit_code: 0
      stdout_contains: Running
    timeout: 30
    retries: 1
    retry_delay: 5
    on_success: done
    on_failure: escalate_ops

  - id: done
    type: end
    name: Success
    summary: "{{ service_name }} is running on {{ host_alias }}"

  - id: escalate_ops
    type: escalate
    name: Escalate to operations
    notify:
      slack_enabled: true
      email_enabled: true
      slack_channel: "#ops-alerts"
      email_to:
        - "ops@example.local"
      title: "Runbook escalation: {{ service_name }}"
      message: "Service recovery failed on {{ host_alias }}"

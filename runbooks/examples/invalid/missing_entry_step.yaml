name: missing_entry_step
description: Invalid because entry_step is missing.
vars:
  service_name: nginx
steps:
  - id: check_service
    type: ssh
    name: Check service status
    command: "systemctl is-active {{ service_name }}"
    expect:
      exit_code: 0
    timeout: 20
    retries: 1
    retry_delay: 5
    on_success: done
    on_failure: escalate_ops

  - id: done
    type: end
    name: End
